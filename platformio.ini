; ============================================================
;  PlatformIO project – BU04 Ai-Thinker UWB test
;  Two build environments share the same source tree.
;  Flash the "anchor" image to the device the user carries,
;  and the "tag" image to the device on the mobile platform.
;
;  Build commands:
;    pio run -e anchor          # compile anchor firmware
;    pio run -e tag             # compile tag firmware
;    pio run -e anchor -t upload   # flash anchor
;    pio run -e tag   -t upload   # flash tag
;    pio device monitor -b 115200  # open Serial monitor
; ============================================================

[platformio]
default_envs = anchor, tag

; ---------- shared settings --------------------------------
[env]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; DW1000 driver (thotro's well-known library)
lib_deps =
    thotro/arduino-dw1000 @ ^0.10.0

; Serial speed for telemetry output
build_flags =
    -DSERIAL_BAUD=115200

monitor_speed = 115200

; ---------- ANCHOR (user-held device) ----------------------
[env:anchor]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR=1

; ---------- TAG (mobile platform device) -------------------
[env:tag]
build_flags =
    ${env.build_flags}
    -DROLE_TAG=1
