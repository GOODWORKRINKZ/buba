; ============================================================
;  PlatformIO – BU04 Ai-Thinker UWB, дистанция + направление
;
;  Основная схема — 2 модуля (PDOA):
;    anchor1_pdoa – якорь с двумя антеннами (дистанция + угол к тегу)
;    tag          – тег в руках пользователя
;
;  Альтернатива — 3 модуля (TWR + трилатерация):
;    anchor1  – главный якорь на платформе (считает направление)
;    anchor2  – ведомый якорь на платформе (отправляет d2 по ESP-NOW)
;    tag      – модуль в руке пользователя
;
;  Источник AT-команд: BU03/BU04 AT指令 V1.0.6
;
;  Команды сборки:
;    pio run -e anchor1_pdoa -t upload   # прошить ANCHOR1 (PDOA, по умолчанию)
;    pio run -e tag          -t upload   # прошить TAG
;    pio run -e anchor1      -t upload   # прошить ANCHOR1 (TWR, нужен ANCHOR2)
;    pio run -e anchor2      -t upload   # прошить ANCHOR2 (TWR)
;    pio device monitor -b 115200        # открыть Serial Monitor
;
;  Важно: BU04 управляется через UART (AT-команды), НЕ через SPI.
;  Подключение: BU04 PA2(TX)→ESP GPIO3(RX),  BU04 PA3(RX)→ESP GPIO2(TX)
; ============================================================

[platformio]
; По умолчанию собираем 2-модульную схему PDOA (дистанция + направление
; одним якорем). Для 3-модульной TWR схемы используйте `pio run -e anchor1
; -e anchor2 -e tag` явно.
default_envs = anchor1_pdoa, tag

; ---------- общие настройки --------------------------------
[env]
platform  = espressif32
board     = esp32-c3-devkitc-02
framework = arduino

; Библиотеки не нужны – BU04 управляется AT-командами по встроенному UART

monitor_speed = 115200

build_flags =
    -DSERIAL_BAUD=115200
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    
; Настройки монитора порта для отладки
monitor_filters = 
    esp32_exception_decoder
    time

; ---------- ANCHOR1 – главный якорь (TWR, 2 якоря) ---------
[env:anchor1]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR1=1

; ---------- ANCHOR1_PDOA – якорь в режиме PDOA (1 якорь) ---
; При PDOA один якорь измеряет угол + дистанцию через фазовую разность.
; ANCHOR2 и ESP-NOW не нужны. Тег нужно добавить командой AT+ADDTAG.
[env:anchor1_pdoa]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR1=1
    -DPDOA_MODE=1

; ---------- ANCHOR2 – ведомый якорь (TWR) ------------------
[env:anchor2]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR2=1

; ---------- TAG – тег в руках пользователя -----------------
[env:tag]
build_flags =
    ${env.build_flags}
    -DROLE_TAG=1
