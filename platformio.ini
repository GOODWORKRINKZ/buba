; ============================================================
;  PlatformIO – BU04 Ai-Thinker UWB, дистанция + направление
;
;  Три роли на трёх платах ESP32-C3 SuperMini:
;    anchor1  – главный якорь на платформе (считает направление)
;    anchor2  – ведомый якорь на платформе (отправляет d2 по ESP-NOW)
;    tag      – модуль в руке пользователя
;
;  Команды сборки:
;    pio run -e anchor1 -t upload   # прошить ANCHOR1
;    pio run -e anchor2 -t upload   # прошить ANCHOR2
;    pio run -e tag     -t upload   # прошить TAG
;    pio device monitor -b 115200   # открыть Serial Monitor
;
;  Важно: BU04 управляется через UART (AT-команды), НЕ через SPI.
;  Подключение: BU04 PA2(TX)→ESP GPIO3(RX),  BU04 PA3(RX)→ESP GPIO2(TX)
; ============================================================

[platformio]
default_envs = anchor1, anchor2, tag

; ---------- общие настройки --------------------------------
[env]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; Библиотеки не нужны – BU04 управляется AT-командами по встроенному UART

monitor_speed = 115200

build_flags =
    -DSERIAL_BAUD=115200

; ---------- ANCHOR1 – главный якорь (платформа) ------------
[env:anchor1]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR1=1

; ---------- ANCHOR2 – ведомый якорь (платформа) ------------
[env:anchor2]
build_flags =
    ${env.build_flags}
    -DROLE_ANCHOR2=1

; ---------- TAG – тег в руках пользователя -----------------
[env:tag]
build_flags =
    ${env.build_flags}
    -DROLE_TAG=1
